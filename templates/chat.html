{% extends "base.html" %}
{% block title %}AntiMAX-Чат{% endblock %}
{% block main %}
<div class="chat-container">
    <div class="chat-header">Чат</div>
    <ul id="messages-list" class="messages"></ul>
    <div class="input-area">
        <input id="message-input" type="text" placeholder="Написать сообщение..." autofocus>
        <button onclick="sendMessage()">Отправить</button>
    </div>
</div>

<script type="text/javascript" charset="utf-8">
    var socket = io();
    socket.on('connect', function () {
        socket.emit('my event', { data: 'I\'m connected!' });
    });
    socket.on('message', function (msg) {
        let li = document.createElement('li');
        li.textContent = msg;

        document.getElementById('messages-list').appendChild(li);
    });
    function sendMessage() {
        let input = document.getElementById('message-input');
        socket.send(input.value);
        input.value = "";
    }
</script>
{% endblock %}
